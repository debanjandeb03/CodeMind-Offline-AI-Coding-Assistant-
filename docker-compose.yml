version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: codemind-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: codemind-frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend